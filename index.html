<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leo AI | Universal Assistant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #050508; color: white; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        #bg-nebula { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: linear-gradient(135deg, #1a0233, #000000, #020b33, #1a0233); background-size: 400% 400%; animation: nebulaMove 12s ease infinite; }
        @keyframes nebulaMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        #stars-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: twinkle var(--duration) infinite ease-in-out; }
        @keyframes twinkle { 0%, 100% { opacity: 0.2; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }
        
        #header { padding: 15px; text-align: center; font-size: 1.6em; font-weight: bold; color: #a8c7fa; letter-spacing: 4px; text-shadow: 0 0 15px #4285f4; }
        
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        .msg { max-width: 85%; padding: 12px 18px; border-radius: 20px; font-size: 15px; line-height: 1.5; backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        .user { align-self: flex-end; background: linear-gradient(135deg, rgba(66, 133, 244, 0.4), rgba(66, 133, 244, 0.2)); border-bottom-right-radius: 4px; }
        .ai { align-self: flex-start; background: rgba(255, 255, 255, 0.07); border-bottom-left-radius: 4px; white-space: pre-wrap; }
        .ai b { color: #a8c7fa; display: block; margin-bottom: 5px; font-size: 1.1em; }

        #input-area { padding: 15px 25px 30px; display: flex; gap: 10px; align-items: center; background: rgba(0,0,0,0.3); }
        input { flex: 1; padding: 14px 22px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.2); background: rgba(25, 26, 27, 0.9); color: white; outline: none; font-size: 15px; transition: 0.3s; }
        input:focus { border-color: #4285f4; box-shadow: 0 0 10px rgba(66, 133, 244, 0.3); }
        
        button { width: 48px; height: 48px; border-radius: 50%; border: none; background: #4285f4; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; flex-shrink: 0; font-size: 18px; }
        button:hover { transform: scale(1.1) rotate(-10deg); background: #5a95f5; box-shadow: 0 0 20px rgba(66, 133, 244, 0.6); }

        code { background: rgba(0,0,0,0.5); padding: 2px 5px; border-radius: 4px; color: #f8f8f2; font-family: monospace; }
    </style>
</head>
<body>

<div id="bg-nebula"></div>
<div id="stars-container"></div>
<div id="header">LEO AI PRO</div>

<div id="chat-window">
    <div class="msg ai"><b>Leo AI:</b> Привіт! Я твій універсальний цифровий помічник 🤖
Я розумію багато мов та допомагаю з:
• 🎮 Іграми (Roblox, MTA, Minecraft)
• 💻 Програмуванням та сайтами
• 📱 Discord та соцмережами
• 📚 Навчанням та ідеями
Запитуй про що завгодно!</div>
</div>

<div id="input-area">
    <input type="text" id="userInput" placeholder="Напиши запит (напр. як створити сервер Discord)..." onkeypress="if(event.key==='Enter') askLeo()">
    <button onclick="askLeo()"><i class="fas fa-paper-plane"></i></button>
</div>

<script>
    const chat = document.getElementById("chat-window");

    // Створення зірок
    const container = document.getElementById('stars-container');
    for (let i = 0; i < 100; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        const size = Math.random() * 2.5 + 'px';
        star.style.width = size; star.style.height = size;
        star.style.top = Math.random() * 100 + '%'; star.style.left = Math.random() * 100 + '%';
        star.style.setProperty('--duration', Math.random() * 3 + 1 + 's');
        container.appendChild(star);
    }

    async function askLeo() {
        const input = document.getElementById("userInput");
        let text = input.value.trim();
        if (!text) return;

        addMsg(text, 'user');
        input.value = "";
        const loading = addMsg("Синхронізація з базою даних...", 'ai');

        const answer = await getKnowledge(text);
        loading.innerHTML = `<b>Leo AI:</b> ${answer}`;
    }

    function addMsg(text, type) {
        const div = document.createElement("div");
        div.className = `msg ${type}`;
        div.innerHTML = type === 'ai' ? `<b>Leo AI:</b> ${text}` : text;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
        return div;
    }

    async function getKnowledge(q) {
        let lowQ = q.toLowerCase();
        
        // 1. Блок ігор та розробки
        if (lowQ.includes("roblox")) return "У Roblox я можу допомогти з Luau скриптами! Наприклад, щоб створити вбивчу частину, використовуй: `script.Parent.Touched:Connect(function(hit) hit.Parent:BreakJoints() end)`";
        if (lowQ.includes("mta")) return "Для MTA (Multi Theft Auto) я знаю про Lua-скриптінг, створення ресурсів та налаштування серверів. Що саме підказати?";
        if (lowQ.includes("discord")) return "У Discord я допоможу налаштувати ботів, створити канали або пояснити права доступу (Permissions).";
        if (lowQ.includes("код") || lowQ.includes("сайт")) return "Я розбираюсь в HTML, CSS, JS та Python. Можу написати каркас сайту або виправити помилку в коді.";

        // 2. Блок "Хто ти" (Твій опис)
        if (lowQ.includes("хто ти") || lowQ.includes("що вмієш")) {
            return "Я універсальний помічник. Я розумію різні мови, допомагаю з навчанням, створюю тексти, код, ідеї та картинки. Допомагаю з Discord, Roblox, MTA та багатьма іншими задачами. Я швидко знаходжу інформацію та пояснюю складні речі простими словами 🤖";
        }

        // 3. Розумний пошук (Визначаємо мову)
        let lang = /[а-яіїєґ]/.test(lowQ) ? 'uk' : 'en';
        let searchWord = lowQ.replace(/(що таке|хто такий|how to|what is|tell me about)/g, "").trim();
        
        try {
            const res = await fetch(`https://${lang}.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(searchWord)}`);
            const data = await res.json();
            if (data.extract) return data.extract;
        } catch (e) {}

        return "Я обробив твій запит. Якщо я не знайшов точної відповіді в енциклопедії, уточни деталі. Я готовий допомогти з кодом, іграми або поясненням будь-якої теми!";
    }
</script>
</body>
</html>
